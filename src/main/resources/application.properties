spring.application.name=BiblioTechRelational

# 1. Connexion Ó la base SQL H2 (En mķmoire)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 2. AccĶs Ó l'interface visuelle (Console H2)
# Adresse : http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. Hibernate : Crķation automatique des tables Ó partir de ton code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true